# RENDER_DEPLOY: Blueprint for Vireel backend as a Render web service.
# Frontend stays on Vercel; set APP_BASE_URL to this service URL after deploy.
services:
  - type: web
    name: vireel-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webapp.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: TIKTOK_CLIENT_KEY
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false
      - key: APP_BASE_URL
        sync: false
